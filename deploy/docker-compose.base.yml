services:
  nats:
    image: nats:2.10-alpine
    container_name: monitor-nats
    command: ["-js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 10s
      timeout: 3s
      retries: 10

  monitor_timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: monitor-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor123
    volumes:
      - monitor_timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 10s
      timeout: 5s
      retries: 20

  monitor-collector:
    build:
      context: ../src/collector
      dockerfile: Dockerfile
    container_name: monitor-collector
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      monitor_timescaledb:
        condition: service_healthy
    environment:
      NET_ENV: dev
      TOPIC_PREFIX: raw
      NATS_URL: nats://nats:4222
      COLLECTOR_API_TOKEN: ${COLLECTOR_API_TOKEN:-change-me}
      TSDB_ENABLED: "true"
      TSDB_DSN: postgresql://monitor:monitor123@monitor_timescaledb:5432/monitor
      TSDB_SCHEMA: monitor_ts
    ports:
      - "9010:9010"

  topo-metric-reporter:
    profiles: ["reporter"]
    build:
      context: ../src/collector
      dockerfile: Dockerfile
    container_name: monitor-topo-metric-reporter
    restart: unless-stopped
    depends_on:
      monitor-collector:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      TOPO_WS_URL: ${TOPO_WS_URL:-ws://host.docker.internal:8765}
      COLLECTOR_URL: http://monitor-collector:9010
      COLLECTOR_API_TOKEN: ${COLLECTOR_API_TOKEN:-change-me}
      TOPOLOGY_EPOCH: ${TOPOLOGY_EPOCH:-default}
      REPORT_INTERVAL_S: ${REPORT_INTERVAL_S:-2}
      REPORT_TIMEOUT_S: ${REPORT_TIMEOUT_S:-5}
      REPORT_MAX_CONCURRENCY: ${REPORT_MAX_CONCURRENCY:-64}
      REPORT_SEED: ${REPORT_SEED:-42}
      METRIC_SOURCE: ${METRIC_SOURCE:-docker}
      NODE_MAPPING_CSV: ${NODE_MAPPING_CSV:-}
      DOCKER_TIMEOUT_S: ${DOCKER_TIMEOUT_S:-5}
      DOCKER_WORKERS: ${DOCKER_WORKERS:-16}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - python
      - scripts/topology_metric_reporter.py
      - --topo-ws-url
      - ${TOPO_WS_URL:-ws://host.docker.internal:8765}
      - --collector-url
      - ${COLLECTOR_URL:-http://monitor-collector:9010}
      - --api-token
      - ${COLLECTOR_API_TOKEN:-change-me}
      - --topology-epoch
      - ${TOPOLOGY_EPOCH:-default}
      - --report-interval-s
      - ${REPORT_INTERVAL_S:-2}
      - --timeout-s
      - ${REPORT_TIMEOUT_S:-5}
      - --max-concurrency
      - ${REPORT_MAX_CONCURRENCY:-64}
      - --seed
      - ${REPORT_SEED:-42}
      - --metric-source
      - ${METRIC_SOURCE:-docker}
      - --node-mapping-csv
      - ${NODE_MAPPING_CSV:-}
      - --docker-timeout-s
      - ${DOCKER_TIMEOUT_S:-5}
      - --docker-workers
      - ${DOCKER_WORKERS:-16}

volumes:
  monitor_timescaledb_data:
